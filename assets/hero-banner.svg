<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="300">
  <style>
    /* Spotlight pulsing */
    .spotlight-pulse {
      animation: pulse-spotlight 6s ease-in-out infinite alternate;
      transform-origin: 600px 150px;
    }
    @keyframes pulse-spotlight {
      0% { transform: scale(0.92); opacity: 0.65; }
      100% { transform: scale(1.08); opacity: 0.95; }
    }

    /* Floating particles (Fireflies) */
    .firefly {
      fill: #FDE047;
      opacity: 0.25;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .ff-1 { animation-duration: 9s; }
    .ff-2 { animation-duration: 14s; animation-delay: 1s; }
    .ff-3 { animation-duration: 11s; animation-delay: 2s; }
    .ff-4 { animation-duration: 8s; animation-delay: 3.5s; }
    .ff-5 { animation-duration: 13s; animation-delay: 0.5s; }
    .ff-6 { animation-duration: 10s; animation-delay: 1.5s; }
    .ff-7 { animation-duration: 12s; animation-delay: 2.5s; }
    .ff-8 { animation-duration: 15s; animation-delay: 0.2s; }

    @keyframes drift {
      0% { transform: translate(0, 0); opacity: 0.2; }
      50% { transform: translate(25px, -20px); opacity: 0.65; }
      100% { transform: translate(-15px, 15px); opacity: 0.2; }
    }

    /* Sparkle/Star animation */
    .sparkle {
      fill: #FFFFFF;
      opacity: 0.2;
      animation: shine 4s infinite ease-in-out;
    }
    .sp-1 { animation-delay: 0s; transform-origin: 320px 90px; }
    .sp-2 { animation-delay: 1.2s; transform-origin: 880px 85px; }
    .sp-3 { animation-delay: 2.4s; transform-origin: 260px 185px; }
    .sp-4 { animation-delay: 0.6s; transform-origin: 940px 190px; }
    .sp-5 { animation-delay: 1.8s; transform-origin: 600px 50px; }

    @keyframes shine {
      0%, 100% { opacity: 0.15; transform: scale(0.7); }
      50% { opacity: 0.95; transform: scale(1.2); }
    }

    /* Floating/Bobbing Tech Icons */
    .bob-icon {
      animation: bob-item 4.5s ease-in-out infinite alternate;
    }
    .bob-1 { animation-delay: 0s; transform-origin: 220px 100px; }
    .bob-2 { animation-delay: 0.8s; transform-origin: 160px 195px; }
    .bob-3 { animation-delay: 1.6s; transform-origin: 980px 100px; }
    .bob-4 { animation-delay: 2.4s; transform-origin: 1040px 195px; }

    @keyframes bob-item {
      0% { transform: translateY(0px) rotate(-3deg); }
      100% { transform: translateY(-10px) rotate(3deg); }
    }

    /* Name bounce/floating */
    .name-float {
      animation: float-name 4.5s ease-in-out infinite alternate;
      transform-origin: 600px 145px;
    }
    @keyframes float-name {
      0% { transform: translateY(0px); }
      100% { transform: translateY(-6px); }
    }

    .title-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 900;
      font-size: 58px;
      fill: url(#name-grad);
      letter-spacing: 2px;
      filter: drop-shadow(0 4px 12px rgba(255, 117, 140, 0.25));
    }

    /* Waving hand animation */
    .waving-hand {
      font-size: 42px;
      animation: wave 1.8s ease-in-out infinite;
      transform-origin: 845px 135px;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-15deg); }
      75% { transform: rotate(15deg); }
    }

    /* Typing/Subtitle cycling */
    .subtitle-item {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-weight: 600;
      font-size: 23px;
      fill: #E2E8F0;
      opacity: 0;
      animation: cycle-subtitles 12s infinite;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .sub-1 { animation-delay: 0s; }
    .sub-2 { animation-delay: 3s; }
    .sub-3 { animation-delay: 6s; }
    .sub-4 { animation-delay: 9s; }

    @keyframes cycle-subtitles {
      0% { opacity: 0; }
      4% { opacity: 1; }
      21% { opacity: 1; }
      25% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* Blinking typing indicator */
    .cursor {
      fill: #FF7EB3;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
  </style>
  <defs>
    <!-- Soft background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0F30" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#0D2B30" />
    </linearGradient>

    <!-- Warm spotlight -->
    <radialGradient id="spotlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7eb3" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#8ec5fc" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#1A0F30" stop-opacity="0" />
    </radialGradient>

    <!-- Friendly name gradient -->
    <linearGradient id="name-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF758C">
        <animate attributeName="stop-color" values="#FF758C;#8EC5FC;#FF7EB3;#FF758C" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#FF7EB3">
        <animate attributeName="stop-color" values="#FF7EB3;#FF758C;#8EC5FC;#FF7EB3" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#8EC5FC">
        <animate attributeName="stop-color" values="#8EC5FC;#FF7EB3;#FF758C;#8EC5FC" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Drop shadow for icons -->
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background base with rounded corners -->
  <rect width="1200" height="300" rx="16" fill="url(#bg-grad)" />

  <!-- Spotlight Glow -->
  <ellipse cx="600" cy="150" rx="450" ry="140" fill="url(#spotlight)" class="spotlight-pulse" />

  <!-- Fireflies Background Layer -->
  <g>
    <circle cx="150" cy="80" r="3.5" fill="#FDE047" class="firefly ff-1" />
    <circle cx="320" cy="220" r="2" fill="#FDE047" class="firefly ff-2" />
    <circle cx="520" cy="70" r="3" fill="#FF758C" class="firefly ff-3" />
    <circle cx="720" cy="240" r="2.5" fill="#8EC5FC" class="firefly ff-4" />
    <circle cx="920" cy="80" r="3.5" fill="#FDE047" class="firefly ff-5" />
    <circle cx="1060" cy="200" r="2" fill="#FDE047" class="firefly ff-6" />
    <circle cx="220" cy="150" r="3" fill="#8EC5FC" class="firefly ff-7" />
    <circle cx="850" cy="180" r="2.5" fill="#FF758C" class="firefly ff-8" />
  </g>

  <!-- Twinkling Sparkles -->
  <g>
    <!-- Sparkle 1 -->
    <path d="M 320 82 Q 320 90 328 90 Q 320 90 320 98 Q 320 90 312 90 Q 320 90 320 82 Z" class="sparkle sp-1" />
    <!-- Sparkle 2 -->
    <path d="M 880 77 Q 880 85 888 85 Q 880 85 880 93 Q 880 85 872 85 Q 880 85 880 77 Z" class="sparkle sp-2" />
    <!-- Sparkle 3 -->
    <path d="M 260 177 Q 260 185 268 185 Q 260 185 260 193 Q 260 185 252 185 Q 260 185 260 177 Z" class="sparkle sp-3" />
    <!-- Sparkle 4 -->
    <path d="M 940 182 Q 940 190 948 190 Q 940 190 940 198 Q 940 190 932 190 Q 940 190 940 182 Z" class="sparkle sp-4" />
    <!-- Sparkle 5 -->
    <path d="M 600 42 Q 600 50 608 50 Q 600 50 600 58 Q 600 50 592 50 Q 600 50 600 42 Z" class="sparkle sp-5" />
  </g>

  <!-- Floating Tech Icons (Approachable Bobbing) -->
  <!-- React Icon (Top Left) -->
  <g class="bob-icon bob-1" transform="translate(220, 100)" filter="url(#soft-shadow)">
    <circle cx="0" cy="0" r="6" fill="#61DAFB" />
    <ellipse rx="22" ry="7" fill="none" stroke="#61DAFB" stroke-width="1.8" />
    <ellipse rx="22" ry="7" fill="none" stroke="#61DAFB" stroke-width="1.8" transform="rotate(60)" />
    <ellipse rx="22" ry="7" fill="none" stroke="#61DAFB" stroke-width="1.8" transform="rotate(120)" />
  </g>

  <!-- Python Icon (Bottom Left) -->
  <g class="bob-icon bob-2" transform="translate(160, 195)" filter="url(#soft-shadow)">
    <path d="M -16 -4 C -16 -12 -10 -18 -2 -18 L 8 -18 C 16 -18 18 -14 18 -10 L 18 -2 C 18 6 12 12 4 12 L 0 12 L 0 8 C 0 2 -4 -2 -10 -2 L -16 -2 Z" fill="#3776AB" />
    <path d="M 16 4 C 16 12 10 18 2 18 L -8 18 C -16 18 -18 14 -18 10 L -18 2 C -18 -6 -12 -12 -4 -12 L 0 -12 L 0 -8 C 0 -2 4 2 10 2 L 16 2 Z" fill="#FFD43B" />
    <circle cx="-6" cy="-11" r="2" fill="#FFFFFF" />
    <circle cx="6" cy="11" r="2" fill="#111111" />
  </g>

  <!-- Node.js Icon (Top Right) -->
  <g class="bob-icon bob-3" transform="translate(980, 100)" filter="url(#soft-shadow)">
    <path d="M 0 -22 L 18 -11 L 18 11 L 0 22 L -18 11 L -18 -11 Z" fill="#339933" />
    <path d="M 0 -22 L 18 -11 L 18 11 L 0 22 Z" fill="#215721" opacity="0.3" />
    <!-- Friendly Leaf lines -->
    <path d="M -8 -4 L 0 4 L 8 -4 M 0 4 L 0 -10" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <!-- AI Brain/Spark Icon (Bottom Right) -->
  <g class="bob-icon bob-4" transform="translate(1040, 195)" filter="url(#soft-shadow)">
    <circle cx="0" cy="0" r="18" fill="#8B5CF6" />
    <!-- Glowing AI connections -->
    <circle cx="-7" cy="-7" r="3" fill="#FFFFFF" />
    <circle cx="7" cy="-7" r="3" fill="#FFFFFF" />
    <circle cx="-7" cy="7" r="3" fill="#FFFFFF" />
    <circle cx="7" cy="7" r="3" fill="#FFFFFF" />
    <circle cx="0" cy="0" r="4.5" fill="#00F2FE" />
    <line x1="-7" y1="-7" x2="0" y2="0" stroke="#FFFFFF" stroke-width="1.5" />
    <line x1="7" y1="-7" x2="0" y2="0" stroke="#FFFFFF" stroke-width="1.5" />
    <line x1="-7" y1="7" x2="0" y2="0" stroke="#FFFFFF" stroke-width="1.5" />
    <line x1="7" y1="7" x2="0" y2="0" stroke="#FFFFFF" stroke-width="1.5" />
  </g>

  <!-- Floating Text Container -->
  <g class="name-float">
    <!-- Main Welcoming Name -->
    <text x="600" y="145" text-anchor="middle" class="title-text">SHAHANWAJ KHAN</text>
    <!-- Friendly Waving Hand -->
    <text x="835" y="135" class="waving-hand">👋</text>
  </g>

  <!-- Subtitle Cycling Subtitles (Stacked with staggered timeline) -->
  <g>
    <!-- Subtitle 1 -->
    <text x="600" y="205" text-anchor="middle" class="subtitle-item sub-1">AI Engineer 👋<tspan class="cursor">|</tspan></text>
    <!-- Subtitle 2 -->
    <text x="600" y="205" text-anchor="middle" class="subtitle-item sub-2">Full Stack Developer 💻<tspan class="cursor">|</tspan></text>
    <!-- Subtitle 3 -->
    <text x="600" y="205" text-anchor="middle" class="subtitle-item sub-3">Problem Solver 🚀<tspan class="cursor">|</tspan></text>
    <!-- Subtitle 4 -->
    <text x="600" y="205" text-anchor="middle" class="subtitle-item sub-4">Always Learning 📚<tspan class="cursor">|</tspan></text>
  </g>
</svg>
