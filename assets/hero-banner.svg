<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="200">
  <defs>
    <!-- Background gradients -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#120c1f" />
      <stop offset="60%" stop-color="#0a0712" />
      <stop offset="100%" stop-color="#050308" />
    </radialGradient>

    <!-- Aurora Glowing Gradients -->
    <radialGradient id="aurora-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b2cbf" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7b2cbf" stop-opacity="0" />
    </radialGradient>

    <!-- Glassmorphic Card border gradient -->
    <linearGradient id="glass-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="30%" stop-color="#00f2fe" stop-opacity="0.35" />
      <stop offset="70%" stop-color="#ff007f" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Text Neon Blur Filters -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* Reset and base styles */
    .title-text {
      font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
      font-weight: 900;
      font-size: 28px;
      fill: #ffffff;
      letter-spacing: 3px;
      text-transform: uppercase;
      filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
    }
    
    /* Keyframe Animations */
    
    /* Aurora moving animation */
    @keyframes float-aurora-1 {
      0% { transform: translate(-40px, -20px) scale(1); }
      50% { transform: translate(40px, 20px) scale(1.1); }
      100% { transform: translate(-40px, -20px) scale(1); }
    }
    @keyframes float-aurora-2 {
      0% { transform: translate(30px, 30px) scale(1.1); }
      50% { transform: translate(-30px, -10px) scale(0.9); }
      100% { transform: translate(30px, 30px) scale(1.1); }
    }
    @keyframes float-aurora-3 {
      0% { transform: translate(0px, -40px) scale(0.9); }
      50% { transform: translate(20px, 30px) scale(1.05); }
      100% { transform: translate(0px, -40px) scale(0.9); }
    }
    
    .aurora-1 { animation: float-aurora-1 12s ease-in-out infinite; transform-origin: 300px 100px; }
    .aurora-2 { animation: float-aurora-2 15s ease-in-out infinite; transform-origin: 500px 100px; }
    .aurora-3 { animation: float-aurora-3 10s ease-in-out infinite; transform-origin: 400px 100px; }

    /* Perspective grid flow */
    @keyframes grid-flow {
      0% { transform: translateY(0); }
      100% { transform: translateY(20px); }
    }
    .grid-lines {
      animation: grid-flow 3s linear infinite;
    }

    /* Subtle title sheen/pulse */
    @keyframes text-glow-pulse {
      0% { opacity: 0.8; filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.6)); }
      50% { opacity: 1; filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.9)) drop-shadow(0 0 25px rgba(255, 0, 127, 0.4)); }
      100% { opacity: 0.8; filter: drop-shadow(0 0 4px rgba(0, 242, 254, 0.6)); }
    }
    .glowing-title {
      animation: text-glow-pulse 4s ease-in-out infinite;
    }

    /* Floating particles */
    @keyframes float-particles {
      0% { transform: translateY(0px) rotate(0deg); opacity: 0.3; }
      50% { transform: translateY(-10px) rotate(180deg); opacity: 0.8; }
      100% { transform: translateY(0px) rotate(360deg); opacity: 0.3; }
    }
    .particle {
      animation: float-particles 6s ease-in-out infinite;
      transform-origin: center;
    }
    .p-delay-1 { animation-delay: 1.5s; animation-duration: 8s; }
    .p-delay-2 { animation-delay: 3s; animation-duration: 7s; }
    
    /* Cyber Scanning Bar */
    @keyframes scanner-move {
      0% { transform: translateX(-10%); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateX(110%); opacity: 0; }
    }
    .scan-bar {
      animation: scanner-move 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* Equalizer/Telemetry Animation */
    @keyframes eq-height {
      0%, 100% { height: 4px; }
      50% { height: 16px; }
    }
    .eq-bar {
      animation: eq-height 1s ease-in-out infinite;
      transform-origin: bottom;
    }
  </style>

  <!-- Background Base -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="10" />

  <!-- Animated Auroras (Under the grid & card for depth) -->
  <g opacity="0.85">
    <circle cx="280" cy="80" r="130" fill="url(#aurora-cyan)" class="aurora-1" />
    <circle cx="520" cy="120" r="140" fill="url(#aurora-pink)" class="aurora-2" />
    <circle cx="400" cy="60" r="120" fill="url(#aurora-purple)" class="aurora-3" />
  </g>

  <!-- perspective grid floor at bottom -->
  <g opacity="0.15">
    <!-- Perspective lines clipping -->
    <mask id="grid-mask">
      <rect x="0" y="100" width="800" height="100" fill="#ffffff" />
    </mask>
    <g mask="url(#grid-mask)">
      <!-- longitudinal perspective lines -->
      <line x1="400" y1="100" x2="-400" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="-200" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="0" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="200" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="400" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="600" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="800" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="1000" y2="200" stroke="#00f2fe" stroke-width="1" />
      <line x1="400" y1="100" x2="1200" y2="200" stroke="#00f2fe" stroke-width="1" />

      <!-- Latitudinal flowing lines -->
      <g class="grid-lines" stroke="#00f2fe" stroke-width="1">
        <line x1="0" y1="100" x2="800" y2="100" />
        <line x1="0" y1="115" x2="800" y2="115" />
        <line x1="0" y1="135" x2="800" y2="135" />
        <line x1="0" y1="160" x2="800" y2="160" />
        <line x1="0" y1="190" x2="800" y2="190" />
      </g>
    </g>
  </g>

  <!-- Floating Particles/Sparkles -->
  <g fill="#ffffff">
    <circle cx="150" cy="50" r="1.5" class="particle" />
    <circle cx="680" cy="150" r="2" class="particle p-delay-1" />
    <circle cx="230" cy="140" r="1" class="particle p-delay-2" />
    <circle cx="600" cy="40" r="2.5" class="particle p-delay-1" opacity="0.6" />
    <polygon points="120,130 122,133 125,133 123,135 124,138 120,136 116,138 117,135 115,133 118,133" fill="#00f2fe" class="particle p-delay-2" />
    <polygon points="700,70 701.5,73 704.5,73 702,75 703,78 700,76 697,78 698,75 695.5,73 698.5,73" fill="#ff007f" class="particle" />
  </g>

  <!-- Glowing Neural Connections (AI theme) -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="0.75" fill="none">
    <!-- Left network -->
    <path d="M 50,60 L 100,40 L 130,80 L 80,110 Z" />
    <circle cx="50" cy="60" r="3" fill="#00f2fe" filter="url(#subtle-glow)" />
    <circle cx="100" cy="40" r="3" fill="#7b2cbf" />
    <circle cx="130" cy="80" r="4" fill="#ff007f" filter="url(#subtle-glow)" />
    <circle cx="80" cy="110" r="2.5" fill="#00f2fe" />
    <line x1="100" y1="40" x2="150" y2="60" stroke="#00f2fe" stroke-dasharray="2 3" />
    <line x1="130" y1="80" x2="190" y2="70" stroke="#ff007f" />

    <!-- Right network -->
    <path d="M 750,140 L 700,160 L 670,120 L 720,90 Z" />
    <circle cx="750" cy="140" r="3" fill="#ff007f" filter="url(#subtle-glow)" />
    <circle cx="700" cy="160" r="2.5" fill="#00f2fe" />
    <circle cx="670" cy="120" r="4" fill="#7b2cbf" filter="url(#subtle-glow)" />
    <circle cx="720" cy="90" r="3" fill="#00f2fe" />
    <line x1="700" y1="160" x2="650" y2="140" stroke="#ff007f" stroke-dasharray="2 3" />
    <line x1="670" y1="120" x2="610" y2="130" stroke="#00f2fe" />
  </g>

  <!-- Frosted Glass Card Panel -->
  <g transform="translate(150, 40)">
    <!-- Glass shadow / Glow -->
    <rect x="-1" y="-1" width="502" height="122" rx="16" fill="#000000" fill-opacity="0.4" filter="blur(8px)" />
    
    <!-- Glass background with thin border -->
    <rect x="0" y="0" width="500" height="120" rx="15" fill="#0d0a1b" fill-opacity="0.65" stroke="url(#glass-border)" stroke-width="1.5" />
    
    <!-- Interactive-looking Corner Tech Accents -->
    <path d="M 10,20 L 10,10 L 20,10" fill="none" stroke="#00f2fe" stroke-width="2" />
    <path d="M 490,20 L 490,10 L 480,10" fill="none" stroke="#00f2fe" stroke-width="2" />
    <path d="M 10,100 L 10,110 L 20,110" fill="none" stroke="#ff007f" stroke-width="2" />
    <path d="M 490,100 L 490,110 L 480,110" fill="none" stroke="#ff007f" stroke-width="2" />

    <!-- Scanning line across card -->
    <line x1="0" y1="0" x2="0" y2="120" stroke="#00f2fe" stroke-width="1.5" opacity="0.8" filter="url(#subtle-glow)" class="scan-bar" />

    <!-- Tech telemetry text inside card -->
    <text x="25" y="25" fill="#00f2fe" font-family="monospace" font-size="8" letter-spacing="1">SYS.LOC: 30.7333° N, 76.7794° E</text>
    <text x="380" y="25" fill="#ff007f" font-family="monospace" font-size="8" letter-spacing="1">COGNITIVE.LAYER: ONLINE</text>

    <!-- Main Glowing Title -->
    <text x="250" y="75" text-anchor="middle" class="title-text glowing-title">SHAHANWAJ KHAN</text>

    <!-- Central Tech loading detail -->
    <g transform="translate(171, 95)" opacity="0.8">
      <rect x="0" y="2" width="150" height="3" fill="#1b152d" rx="1.5" />
      <!-- Animated progress indicator -->
      <rect x="30" y="2" width="40" height="3" fill="#00f2fe" rx="1.5">
        <animate attributeName="x" values="0; 110; 0" dur="3s" repeatCount="indefinite" />
      </rect>
      <!-- Small blinking node -->
      <circle cx="158" cy="3.5" r="2.5" fill="#ff007f">
        <animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>

  <!-- Interactive widgets at the edges of the banner -->
  
  <!-- Left Side: Live Activity Monitor widget -->
  <g transform="translate(25, 60)" opacity="0.85">
    <circle cx="20" cy="20" r="18" fill="#110d21" stroke="#251a3d" stroke-width="1" />
    <!-- Blinking radar circle -->
    <circle cx="20" cy="20" r="12" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.6">
      <animate attributeName="r" values="4; 16; 4" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8; 0; 0.8" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <!-- Pulser Dot -->
    <circle cx="20" cy="20" r="3.5" fill="#00f2fe" filter="url(#subtle-glow)" />
    <text x="45" y="18" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="10">SYS ACTIVE</text>
    <text x="45" y="28" fill="#8e81ac" font-family="monospace" font-size="7">PING: 24MS</text>
  </g>

  <!-- Right Side: Small Audio-Wave/Equalizer widget -->
  <g transform="translate(705, 60)" opacity="0.85">
    <circle cx="20" cy="20" r="18" fill="#110d21" stroke="#251a3d" stroke-width="1" />
    <!-- Mini Equalizer bars -->
    <g transform="translate(11, 28) scale(1, -1)" fill="#ff007f">
      <rect x="0" y="0" width="2.5" height="12" rx="1" class="eq-bar" style="animation-delay: 0.1s; animation-duration: 0.8s;" />
      <rect x="4" y="0" width="2.5" height="16" rx="1" class="eq-bar" style="animation-delay: 0.3s; animation-duration: 1.1s;" />
      <rect x="8" y="0" width="2.5" height="8" rx="1" class="eq-bar" style="animation-delay: 0s; animation-duration: 0.6s;" />
      <rect x="12" y="0" width="2.5" height="14" rx="1" class="eq-bar" style="animation-delay: 0.4s; animation-duration: 0.9s;" />
      <rect x="16" y="0" width="2.5" height="10" rx="1" class="eq-bar" style="animation-delay: 0.2s; animation-duration: 0.7s;" />
    </g>
    <text x="-65" y="18" text-anchor="start" fill="#ffffff" font-family="system-ui, sans-serif" font-weight="700" font-size="10" transform="translate(45, 0)">AI STREAM</text>
    <text x="-65" y="28" text-anchor="start" fill="#8e81ac" font-family="monospace" font-size="7" transform="translate(45, 0)">FPS: 60</text>
  </g>

  <!-- Glass diagonal glare sheen -->
  <path d="M 0,0 L 200,0 L 50,200 L -150,200 Z" fill="#ffffff" opacity="0.03" pointer-events="none" />
  <path d="M 600,0 L 800,0 L 650,200 L 450,200 Z" fill="#ffffff" opacity="0.015" pointer-events="none" />
</svg>
