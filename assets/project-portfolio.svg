<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&amp;family=Fira+Code:wght@500&amp;display=swap');
    .card {
      fill: #0D1117;
      stroke: #21262D;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card:hover {
      fill: #161B22;
      stroke: url(#glow-grad);
      filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.25));
    }
    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 19px;
      fill: #C9D1D9;
      transition: fill 0.3s ease;
    }
    .card:hover .title {
      fill: #8B5CF6;
    }
    .desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      fill: #8B949E;
    }
    .btn {
      fill: #21262D;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .btn-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #8B949E;
      transition: all 0.3s ease;
    }
    .card:hover .btn {
      fill: #8B5CF6;
      stroke: #8B5CF6;
    }
    .card:hover .btn-text {
      fill: #0D1117;
    }
    .icon-container {
      transition: transform 0.5s ease;
      transform-origin: 40px 70px;
    }
    .card:hover .icon-container {
      transform: scale(1.15) ;
    }
    .icon-draw {
      fill: none;
      stroke: #8B5CF6;
      stroke-width: 2;
      stroke-linejoin: round;
      stroke-linecap: round;
      transition: stroke 0.3s ease;
    }
    .card:hover .icon-draw {
      stroke: #8B5CF6;
      filter: drop-shadow(0 0 3px #8B5CF6);
    }
    
    /* Staggered Badge Wave Animation */
    .badge-item {
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease;
    }
    .card:hover .badge-1 { transform: translateY(-3px); }
    .card:hover .badge-2 { transform: translateY(-3px); transition-delay: 0.04s; }
    .card:hover .badge-3 { transform: translateY(-3px); transition-delay: 0.08s; }
    .card:hover .badge-4 { transform: translateY(-3px); transition-delay: 0.12s; }
    .card:hover .badge-5 { transform: translateY(-3px); transition-delay: 0.16s; }

    /* Default badge style */
    .badge-bg {
      fill: #161B22;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .badge-text {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #8B949E;
      transition: all 0.3s ease;
    }
    .card:hover .badge-text {
      fill: #E6EDF0;
    }

    /* Brand Colors Hover Styling */
    .card:hover .bg-react { fill: #14232C; stroke: #61DAFB; }
    .card:hover .txt-react { fill: #61DAFB; }
    
    .card:hover .bg-node { fill: #142517; stroke: #339933; }
    .card:hover .txt-node { fill: #339933; }
    
    .card:hover .bg-express { fill: #1A1A1A; stroke: #FFFFFF; }
    .card:hover .txt-express { fill: #FFFFFF; }
    
    .card:hover .bg-mongodb { fill: #112516; stroke: #47A248; }
    .card:hover .txt-mongodb { fill: #47A248; }
    
    .card:hover .bg-tailwind { fill: #11252C; stroke: #06B6D4; }
    .card:hover .txt-tailwind { fill: #06B6D4; }
    
    .card:hover .bg-socket { fill: #1A1A1A; stroke: #FFFFFF; }
    .card:hover .txt-socket { fill: #FFFFFF; }
    
    .card:hover .bg-django { fill: #0B251B; stroke: #092E20; }
    .card:hover .txt-django { fill: #44B78B; }
    
    .card:hover .bg-sqlite { fill: #111F2C; stroke: #003B57; }
    .card:hover .txt-sqlite { fill: #40A6F2; }
    
    .card:hover .bg-html { fill: #2C1A14; stroke: #E34F26; }
    .card:hover .txt-html { fill: #E34F26; }
    
    .card:hover .bg-css { fill: #111F2C; stroke: #1572B6; }
    .card:hover .txt-css { fill: #1572B6; }
    
    .card:hover .bg-bootstrap { fill: #20142C; stroke: #7952B3; }
    .card:hover .txt-bootstrap { fill: #9B72D3; }
    
    .card:hover .bg-laravel { fill: #2C1415; stroke: #FF2D20; }
    .card:hover .txt-laravel { fill: #FF2D20; }
    
    .card:hover .bg-gis { fill: #142820; stroke: #10B981; }
    .card:hover .txt-gis { fill: #10B981; }
    
    .card:hover .bg-python { fill: #111F2C; stroke: #3776AB; }
    .card:hover .txt-python { fill: #FFD43B; }
    
    .card:hover .bg-flask { fill: #1A1A1A; stroke: #FFFFFF; }
    .card:hover .txt-flask { fill: #FFFFFF; }
    
    .card:hover .bg-otp { fill: #2C1F11; stroke: #F59E0B; }
    .card:hover .txt-otp { fill: #F59E0B; }
    
    .card:hover .bg-recharts { fill: #112525; stroke: #3182CE; }
    .card:hover .txt-recharts { fill: #3182CE; }
    
    .card:hover .bg-storage { fill: #1A222C; stroke: #718096; }
    .card:hover .txt-storage { fill: #A0AEC0; }
    
    .card:hover .bg-gemini { fill: #14202F; stroke: #15C3FF; }
    .card:hover .txt-gemini { fill: #15C3FF; }
    
    .card:hover .bg-cpp { fill: #111F2C; stroke: #00599C; }
    .card:hover .txt-cpp { fill: #00599C; }
    
    .card:hover .bg-java { fill: #2C1E11; stroke: #ED8B00; }
    .card:hover .txt-java { fill: #ED8B00; }
    
    .card:hover .bg-files { fill: #1C2420; stroke: #10B981; }
    .card:hover .txt-files { fill: #10B981; }
    
    .card:hover .bg-framer { fill: #2C1122; stroke: #F107A3; }
    .card:hover .txt-framer { fill: #F107A3; }
    
    .card:hover .bg-js { fill: #2C2B11; stroke: #F7DF1E; }
    .card:hover .txt-js { fill: #F7DF1E; }

  </style>
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  
  <rect class="card" x="2" y="2" width="796" height="136" rx="8" />
  
  <!-- Icon Wrapper -->
  <g class="icon-container">
    <circle cx="40" cy="70" r="22" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <rect class="icon-draw" x="30" y="60" width="20" height="15" rx="1" />
    <path class="icon-draw" d="M35 75 L33 80 L47 80 L45 75 Z" />
    <line class="icon-draw" x1="32" y1="71" x2="48" y2="71" />
  </g>
  
  <!-- Content -->
  <text x="80" y="42" class="title">💻 Modern Developer Portfolio</text>
  <text x="80" y="65" class="desc">A fast, fully responsive portfolio showcasing skills, projects, and cloud certifications.</text>
  
  <!-- Tech Stack Badges -->
  <g transform="translate(80, 85)">
    <g class="badge-item badge-1" transform="translate(0, 0)">
      <rect x="0" y="0" width="75" height="22" rx="4" class="badge-bg bg-react" />
      <text x="37.5" y="15" text-anchor="middle" class="badge-text txt-react">React.js</text>
    </g>
    <g class="badge-item badge-2" transform="translate(83, 0)">
      <rect x="0" y="0" width="100" height="22" rx="4" class="badge-bg bg-tailwind" />
      <text x="50.0" y="15" text-anchor="middle" class="badge-text txt-tailwind">Tailwind CSS</text>
    </g>
    <g class="badge-item badge-3" transform="translate(191, 0)">
      <rect x="0" y="0" width="105" height="22" rx="4" class="badge-bg bg-framer" />
      <text x="52.5" y="15" text-anchor="middle" class="badge-text txt-framer">Framer Motion</text>
    </g>
  </g>
  
  <!-- Button "View Project" -->
  <rect x="670" y="50" width="100" height="36" rx="18" class="btn" />
  <text x="720" y="72" text-anchor="middle" class="btn-text">View Project ↗</text>
</svg>
