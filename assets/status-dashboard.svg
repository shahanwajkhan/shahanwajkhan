<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 210" width="100%" height="210">
  <style>
    /* Title bar */
    .title-text {
      font-family: "Courier New", Courier, monospace;
      font-weight: 900;
      font-size: 13px;
      fill: #FFFFFF;
      letter-spacing: 2px;
      filter: drop-shadow(0 0 6px #00F2FE);
    }

    /* Field label (left-side key) */
    .label {
      font-family: "Courier New", Courier, monospace;
      font-weight: 700;
      font-size: 12px;
      fill: #58A6FF;
      letter-spacing: 1px;
      filter: drop-shadow(0 0 3px rgba(88,166,255,0.5));
    }

    /* Field value (right-side content) */
    .value {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #E6EDF3;
      letter-spacing: 0.5px;
    }

    /* Green online value */
    .value-online {
      font-family: "Courier New", Courier, monospace;
      font-weight: 800;
      font-size: 13px;
      fill: #39D353;
      letter-spacing: 1px;
      filter: drop-shadow(0 0 5px #39D353);
    }

    /* Mission (cyan tinted) */
    .value-mission {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-weight: 700;
      font-size: 12.5px;
      fill: #79C0FF;
      letter-spacing: 0.4px;
    }

    /* HUD decorative tiny text */
    .hud-tiny {
      font-family: "Courier New", Courier, monospace;
      font-size: 8px;
      fill: #388BFD;
      opacity: 0.7;
    }

    /* Heartbeat dot */
    .status-pulse {
      animation: pulse-glow 1.6s ease-in-out infinite alternate;
    }
    @keyframes pulse-glow {
      0%   { opacity: 0.35; filter: drop-shadow(0 0 3px #39D353); r: 5; }
      100% { opacity: 1;    filter: drop-shadow(0 0 12px #39D353); r: 6.5; }
    }

    /* Generic blink */
    .blink {
      animation: blink-anim 1.8s step-end infinite;
    }
    @keyframes blink-anim {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Corner bracket glow flicker */
    .bracket-cyan {
      stroke: #00F2FE;
      filter: drop-shadow(0 0 5px #00F2FE);
      animation: bracket-flicker 4s ease-in-out infinite alternate;
    }
    .bracket-purple {
      stroke: #BC34FA;
      filter: drop-shadow(0 0 5px #BC34FA);
      animation: bracket-flicker 5s ease-in-out infinite alternate;
    }
    @keyframes bracket-flicker {
      0%   { opacity: 0.7; }
      70%  { opacity: 1;   }
      100% { opacity: 0.85;}
    }

    /* Divider line pulse */
    .divider-pulse {
      animation: div-pulse 3s ease-in-out infinite alternate;
    }
    @keyframes div-pulse {
      0%   { opacity: 0.3; }
      100% { opacity: 0.9; }
    }

    /* Ambient nebula breathing */
    .nebula {
      animation: nebula-breath 7s ease-in-out infinite alternate;
    }
    .nebula-cyan  { fill: #00F2FE; animation-duration: 6s; }
    .nebula-purple{ fill: #BC34FA; animation-duration: 9s; }
    @keyframes nebula-breath {
      0%   { opacity: 0.1; }
      100% { opacity: 0.28;}
    }

    /* Progress bar shimmer */
    .bar-shimmer {
      animation: shimmer 2.5s linear infinite;
    }
    @keyframes shimmer {
      0%   { transform: translateX(-160px); }
      100% { transform: translateX(160px);  }
    }

    /* Scan line */
    .scan {
      animation: scan-move 5s linear infinite;
    }
    @keyframes scan-move {
      0%   { transform: translateY(0px);   opacity: 0;   }
      5%   {                                opacity: 0.5; }
      95%  {                                opacity: 0.3; }
      100% { transform: translateY(210px); opacity: 0;   }
    }
  </style>
  <defs>
    <filter id="blur-nebula">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glass border gradient -->
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00F2FE" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#1C2333" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#BC34FA" stop-opacity="0.7"/>
    </linearGradient>

    <!-- Coffee bar gradient -->
    <linearGradient id="coffee-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C084FC"/>
      <stop offset="60%"  stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Shimmer overlay -->
    <linearGradient id="shimmer-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="50%"  stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Vertical mid divider gradient -->
    <linearGradient id="vdiv-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#00F2FE" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00F2FE" stop-opacity="0.6"/>
      <stop offset="70%"  stop-color="#BC34FA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#BC34FA" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip paths -->
    <clipPath id="card-clip">
      <rect x="12" y="12" width="776" height="186" rx="7"/>
    </clipPath>
    <clipPath id="bar-clip">
      <rect x="133" y="112" width="144" height="12" rx="3"/>
    </clipPath>
  </defs>

  <!-- ── BASE CANVAS ── -->
  <rect width="800" height="210" fill="#080C14" rx="9"/>

  <!-- ── AMBIENT NEBULAE ── -->
  <g filter="url(#blur-nebula)">
    <circle cx="170" cy="105" r="90"  class="nebula nebula-cyan"/>
    <circle cx="630" cy="105" r="100" class="nebula nebula-purple"/>
  </g>

  <!-- ── SCAN LINE ── -->
  <rect x="12" y="0" width="776" height="3" fill="url(#shimmer-grad)" class="scan" clip-path="url(#card-clip)"/>

  <!-- ── GRID LINES ── -->
  <g stroke="#1A2132" stroke-width="1">
    <!-- Title separator -->
    <line x1="12" y1="58" x2="788" y2="58" class="divider-pulse" stroke="#1E3A5F"/>
    <!-- Vertical mid-line -->
    <line x1="400" y1="58" x2="400" y2="178" stroke="url(#vdiv-grad)" stroke-width="1.2"/>
    <!-- Row separators -->
    <line x1="12"  y1="98"  x2="390" y2="98"  stroke="#1E2D45" stroke-width="0.8"/>
    <line x1="410" y1="98"  x2="788" y2="98"  stroke="#1E2D45" stroke-width="0.8"/>
    <line x1="12"  y1="138" x2="390" y2="138" stroke="#1E2D45" stroke-width="0.8"/>
    <line x1="410" y1="138" x2="788" y2="138" stroke="#1E2D45" stroke-width="0.8"/>
    <!-- Mission separator -->
    <line x1="12" y1="178" x2="788" y2="178" stroke="#1E3A5F" stroke-width="0.8" class="divider-pulse"/>
  </g>

  <!-- ── TITLE BAR ── -->
  <g>
    <text x="35" y="40" class="title-text">🤖 AI SYSTEM STATUS DASHBOARD</text>
    <!-- Underline accent -->
    <line x1="35" y1="48" x2="290" y2="48" stroke="#00F2FE" stroke-width="1.5" opacity="0.8"/>
    <!-- Status dot + label -->
    <circle cx="310" cy="36" r="5" fill="#39D353" class="status-pulse"/>
    <text x="322" y="40" class="hud-tiny" fill="#39D353" style="font-size:9px;font-weight:700;">SYSTEMS: ONLINE</text>
    <!-- Right corner HUD -->
    <text x="680" y="40" class="hud-tiny">SYNC: 100%</text>
    <circle cx="670" cy="36" r="2.5" fill="#00F2FE" class="blink"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════
       LEFT COLUMN
  ══════════════════════════════════════════════════════════════ -->

  <!-- Row 1 L: Status -->
  <g transform="translate(28, 65)">
    <text y="18" class="label">🟢  STATUS</text>
    <text x="115" y="18" class="value-online">ONLINE // SECURE</text>
    <!-- ripple rings -->
    <circle cx="9" cy="14" r="8" fill="none" stroke="#39D353" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="5;14;5" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Row 2 L: AI Engine -->
  <g transform="translate(28, 105)">
    <text y="18" class="label">🧠  AI ENGINE</text>
    <text x="115" y="18" class="value">Gemini / Django / MERN</text>
  </g>

  <!-- Row 3 L: Location -->
  <g transform="translate(28, 145)">
    <text y="18" class="label">📍  LOCATION</text>
    <text x="115" y="18" class="value">Punjab, India</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════
       RIGHT COLUMN
  ══════════════════════════════════════════════════════════════ -->

  <!-- Row 1 R: Current Role -->
  <g transform="translate(415, 65)">
    <text y="18" class="label">💻  CURRENT ROLE</text>
    <text x="140" y="18" class="value">Full Stack Dev &amp; AI Engineer</text>
  </g>

  <!-- Row 2 R: Current Focus -->
  <g transform="translate(415, 105)">
    <text y="18" class="label">🚀  CURRENT FOCUS</text>
    <text x="140" y="18" class="value">MERN • Django • Gen AI</text>
  </g>

  <!-- Row 3 R: Coffee Level (animated bar) -->
  <g transform="translate(415, 145)">
    <text y="18" class="label">☕  COFFEE LEVEL</text>
    <!-- Track -->
    <rect x="133" y="6" width="160" height="12" rx="4" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <!-- Animated fill -->
    <rect x="133" y="6" width="0" height="12" rx="4" fill="url(#coffee-grad)" filter="url(#glow-sm)">
      <animate attributeName="width" from="0" to="144" dur="1.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1" keyTimes="0;1"/>
    </rect>
    <!-- Shimmer on top -->
    <rect x="133" y="6" width="40" height="12" rx="4" fill="url(#shimmer-grad)" class="bar-shimmer" clip-path="url(#bar-clip)"/>
    <!-- Percentage -->
    <text x="302" y="18" class="value" fill="#C084FC" style="font-size:13px;font-weight:800;filter:drop-shadow(0 0 4px #A855F7);">90%</text>
  </g>

  <!-- ══════════════════════════════════════════════════════════════
       MISSION ROW (bottom full-width)
  ══════════════════════════════════════════════════════════════ -->
  <g transform="translate(28, 180)">
    <text y="18" class="label">🎯  MISSION</text>
    <text x="115" y="18" class="value-mission">
      Building production-grade, AI-powered solutions that solve real-world problems.
    </text>
    <tspan class="blink" fill="#00F2FE" dx="2">▌</tspan>
  </g>

  <!-- ── HUD FRAME ── -->
  <!-- Main border -->
  <rect x="12" y="12" width="776" height="186" fill="none" stroke="url(#border-grad)" stroke-width="1.8" rx="7"/>

  <!-- Corner brackets cyan (top) -->
  <path d="M 12 36 L 12 12 L 36 12" fill="none" stroke-width="2.5" class="bracket-cyan"/>
  <path d="M 788 36 L 788 12 L 764 12" fill="none" stroke-width="2.5" class="bracket-cyan"/>
  <!-- Corner brackets purple (bottom) -->
  <path d="M 12 174 L 12 198 L 36 198" fill="none" stroke-width="2.5" class="bracket-purple"/>
  <path d="M 788 174 L 788 198 L 764 198" fill="none" stroke-width="2.5" class="bracket-purple"/>

  <!-- Bottom HUD text -->
  <text x="680" y="205" class="hud-tiny">GRID_MODE: ACTIVE</text>
  <text x="35"  y="205" class="hud-tiny">COGNITIVE_LAYER: ONLINE</text>

  <!-- Glass sheen overlay -->
  <g clip-path="url(#card-clip)">
    <polygon points="0,0 220,0 50,-220" fill="#FFFFFF" opacity="0.03"/>
    <polygon points="480,-220 700,0 800,0 800,-220" fill="#FFFFFF" opacity="0.02"/>
  </g>
</svg>
