<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&amp;family=Fira+Code:wght@500&amp;display=swap');
    .card {
      fill: #0D1117;
      stroke: #21262D;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card:hover {
      fill: #161B22;
      stroke: url(#glow-grad);
      filter: drop-shadow(0 0 10px rgba(255, 123, 114, 0.25));
    }
    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 19px;
      fill: #C9D1D9;
      transition: fill 0.3s ease;
    }
    .card:hover .title {
      fill: #FF7B72;
    }
    .desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      fill: #8B949E;
    }
    .badge {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #8B949E;
      transition: fill 0.3s ease;
    }
    .badge-bg {
      fill: #161B22;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .card:hover .badge-bg {
      stroke: #FF7B72;
      fill: #2C1A1D;
    }
    .card:hover .badge {
      fill: #E6EDF0;
    }
    .btn {
      fill: #21262D;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .btn-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #8B949E;
      transition: all 0.3s ease;
    }
    .card:hover .btn {
      fill: #FF7B72;
      stroke: #FF7B72;
    }
    .card:hover .btn-text {
      fill: #0D1117;
    }
    .icon-container {
      transition: transform 0.5s ease;
      transform-origin: 40px 70px;
    }
    .card:hover .icon-container {
      transform: scale(1.12) rotate(-15deg);
    }
    .icon-trophy {
      fill: none;
      stroke: #FF7B72;
      stroke-width: 2;
      stroke-linejoin: round;
      stroke-linecap: round;
      transition: stroke 0.3s ease;
    }
    .card:hover .icon-trophy {
      stroke: #FF7B72;
      filter: drop-shadow(0 0 3px #FF7B72);
    }
  </style>
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF7B72" />
      <stop offset="100%" stop-color="#FFA657" />
    </linearGradient>
  </defs>
  
  <rect class="card" x="2" y="2" width="796" height="136" rx="8" />
  
  <!-- Icon Wrapper -->
  <g class="icon-container">
    <circle cx="40" cy="70" r="22" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <path class="icon-trophy" d="M32 60 L48 60 L46 72 Q46 76 40 78 Q34 76 34 72 Z" />
    <path class="icon-trophy" d="M40 78 L40 82 M35 82 L45 82" />
    <path class="icon-trophy" d="M32 63 C29 63 29 69 32 69" />
    <path class="icon-trophy" d="M48 63 C51 63 51 69 48 69" />
  </g>
  
  <!-- Content -->
  <text x="80" y="42" class="title">🏏 Cricket Management System</text>
  <text x="80" y="65" class="desc">Sports coordination platform featuring team analytics, match scheduling, and live chat.</text>
  
  <!-- Tech Stack Badges -->
  <g transform="translate(80, 85)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="75" height="22" rx="4" class="badge-bg" />
    <text x="37.5" y="15" text-anchor="middle" class="badge">React.js</text>
    
    <!-- Badge 2 -->
    <rect x="83" y="0" width="75" height="22" rx="4" class="badge-bg" />
    <text x="120.5" y="15" text-anchor="middle" class="badge">Node.js</text>
    
    <!-- Badge 3 -->
    <rect x="166" y="0" width="75" height="22" rx="4" class="badge-bg" />
    <text x="203.5" y="15" text-anchor="middle" class="badge">Express</text>
    
    <!-- Badge 4 -->
    <rect x="249" y="0" width="80" height="22" rx="4" class="badge-bg" />
    <text x="289" y="15" text-anchor="middle" class="badge">MongoDB</text>
    
    <!-- Badge 5 -->
    <rect x="337" y="0" width="80" height="22" rx="4" class="badge-bg" />
    <text x="377" y="15" text-anchor="middle" class="badge">Socket.io</text>
  </g>
  
  <!-- Button "View Project" -->
  <rect x="670" y="50" width="100" height="36" rx="18" class="btn" />
  <text x="720" y="72" text-anchor="middle" class="btn-text">View Project ↗</text>
</svg>
