<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&amp;family=Fira+Code:wght@500&amp;display=swap');
    .card {
      fill: #0D1117;
      stroke: #21262D;
      stroke-width: 1.5;
      transition: all 0.3s ease;
    }
    .card:hover {
      fill: #161B22;
      stroke: url(#glow-grad);
      filter: drop-shadow(0 0 10px rgba(99, 102, 241, 0.25));
    }
    .title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 19px;
      fill: #C9D1D9;
      transition: fill 0.3s ease;
    }
    .card:hover .title {
      fill: #6366F1;
    }
    .desc {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      fill: #8B949E;
    }
    .badge {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      fill: #8B949E;
      transition: fill 0.3s ease;
    }
    .badge-bg {
      fill: #161B22;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .card:hover .badge-bg {
      stroke: #6366F1;
      fill: #1C1B2B;
    }
    .card:hover .badge {
      fill: #E6EDF0;
    }
    .btn {
      fill: #21262D;
      stroke: #30363D;
      stroke-width: 1;
      transition: all 0.3s ease;
    }
    .btn-text {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #8B949E;
      transition: all 0.3s ease;
    }
    .card:hover .btn {
      fill: #6366F1;
      stroke: #6366F1;
    }
    .card:hover .btn-text {
      fill: #0D1117;
    }
    .icon-container {
      transition: transform 0.5s ease;
      transform-origin: 40px 70px;
    }
    .card:hover .icon-container {
      transform: scale(1.15) rotate(-10deg);
    }
    .icon-report {
      fill: none;
      stroke: #6366F1;
      stroke-width: 2;
      stroke-linejoin: round;
      stroke-linecap: round;
      transition: stroke 0.3s ease;
    }
    .card:hover .icon-report {
      stroke: #6366F1;
      filter: drop-shadow(0 0 3px #6366F1);
    }
  </style>
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
  </defs>
  
  <rect class="card" x="2" y="2" width="796" height="136" rx="8" />
  
  <!-- Icon Wrapper -->
  <g class="icon-container">
    <circle cx="40" cy="70" r="22" fill="#161B22" stroke="#30363D" stroke-width="1" />
    <path class="icon-report" d="M32 58 L44 58 L48 62 L48 82 L32 82 Z" />
    <path class="icon-report" d="M44 58 L44 62 L48 62" />
    <path class="icon-report" d="M36 66 L44 66 M36 72 L44 72 M36 78 L40 78" />
  </g>
  
  <!-- Content -->
  <text x="80" y="42" class="title">📝 Student Report Card System</text>
  <text x="80" y="65" class="desc">A console/web-based student management system for persistency records and automated grading.</text>
  
  <!-- Tech Stack Badges -->
  <g transform="translate(80, 85)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="60" height="22" rx="4" class="badge-bg" />
    <text x="30" y="15" text-anchor="middle" class="badge">C++</text>
    
    <!-- Badge 2 -->
    <rect x="68" y="0" width="65" height="22" rx="4" class="badge-bg" />
    <text x="100.5" y="15" text-anchor="middle" class="badge">Java</text>
    
    <!-- Badge 3 -->
    <rect x="141" y="0" width="75" height="22" rx="4" class="badge-bg" />
    <text x="178.5" y="15" text-anchor="middle" class="badge">Python</text>
    
    <!-- Badge 4 -->
    <rect x="224" y="0" width="90" height="22" rx="4" class="badge-bg" />
    <text x="269" y="15" text-anchor="middle" class="badge">Files I/O</text>
  </g>
  
  <!-- Button "View Project" -->
  <rect x="670" y="50" width="100" height="36" rx="18" class="btn" />
  <text x="720" y="72" text-anchor="middle" class="btn-text">View Project ↗</text>
</svg>
